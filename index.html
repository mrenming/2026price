<html lang="zh-CN">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Tailwind 配置 -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#165DFF',
                        secondary: '#36CFC9',
                        neutral: '#F5F7FA',
                        dark: '#1D2129',
                        light: '#86909C'
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                    },
                }
            }
        }
    </script>
    
    <style type="text/tailwindcss">
        @layer utilities {
            .content-auto {
                content-visibility: auto;
            }
            .select-wrapper {
                position: relative;
            }
            .select-wrapper::after {
                content: "\f078";
                font-family: "FontAwesome";
                position: absolute;
                right: 1rem;
                top: 50%;
                transform: translateY(-50%);
                pointer-events: none;
                color: #86909C;
            }
            .result-item {
                transition: all 0.3s ease;
            }
            .result-item:hover {
                transform: translateX(4px);
            }
            .loader {
                border-top-color: #165DFF;
                animation: spinner 0.8s linear infinite;
            }
            @keyframes spinner {
                0% { transform: rotate(0deg); }
                100% { transform: rotate(360deg); }
            }
        }
    </style>
</head>
<body class="bg-neutral min-h-screen font-sans text-dark">
    <!-- 顶部导航栏 -->
    <header class="bg-primary text-white shadow-md sticky top-0 z-50">

            <h1 class="text-[clamp(1.2rem,5vw,1.5rem)] font-bold flex items-center">

    </header>

    <main class="container mx-auto px-4 py-6">

                <i class="fa fa-filter mr-2"></i>查询条件
            </h2>
            
            <div class="space-y-4">
                <!-- 第一级：Market -->
                <div class="select-wrapper">
                    <label for="market" class="block text-sm font-medium text-light mb-1">1. 市场领域 (Market)</label>
                    <select id="market" class="w-full px-4 py-2.5 rounded-lg border border-gray-300 focus:border-primary focus:ring-2 focus:ring-primary/20 outline-none appearance-none bg-white cursor-pointer transition-all">
                        <option value="">请选择市场领域</option>
                        <!-- 由JS动态填充 -->
                    </select>
                </div>
                
                <!-- 第二级：ProductLine -->
                <div class="select-wrapper">
                    <label for="productLine" class="block text-sm font-medium text-light mb-1">2. 产品线 (ProductLine)</label>

                        <option value="">请先选择市场领域</option>
                        <!-- 由JS动态填充 -->
                    </select>
                </div>
                
                <!-- 第三级：Model -->
                <div class="select-wrapper">
                    <label for="model" class="block text-sm font-medium text-light mb-1">3. 型号 (Model)</label>
                    <select id="model" class="w-full px-4 py-2.5 rounded-lg border border-gray-300 focus:border-primary focus:ring-2 focus:ring-primary/20 outline-none appearance-none bg-white cursor-pointer transition-all" disabled>
                        <option value="">请先选择产品线</option>
                        <!-- 由JS动态填充 -->
                    </select>
                </div>
                
                <!-- 第四级：合约类型 -->
                <div class="select-wrapper">
                    <label for="contractType" class="block text-sm font-medium text-light mb-1">4. 合约类型</label>
                    <select id="contractType" class="w-full px-4 py-2.5 rounded-lg border border-gray-300 focus:border-primary focus:ring-2 focus:ring-primary/20 outline-none appearance-none bg-white cursor-pointer transition-all" disabled>
                        <option value="">请先选择型号</option>
                        <!-- 由JS动态填充 -->
                    </select>
                </div>
                
                <!-- 查询按钮 -->
                <button id="searchBtn" class="w-full bg-primary hover:bg-primary/90 text-white font-medium py-3 px-4 rounded-lg transition-all duration-300 flex items-center justify-center mt-2 disabled:opacity-50 disabled:cursor-not-allowed" disabled>
                    <i class="fa fa-search mr-2"></i> 查询价格
                </button>
            </div>
        </section>
        
        <!-- 结果区域 -->
        <section id="resultSection" class="hidden">
            <!-- 结果统计 -->
            <div class="bg-white rounded-xl shadow-md p-4 mb-4 flex justify-between items-center">
                <div class="text-sm text-light">
                    <span id="resultCount" class="font-semibold text-primary">0</span> 条查询结果
                </div>
                <button id="exportBtn" class="bg-secondary hover:bg-secondary/90 text-white text-sm px-3 py-1.5 rounded-md flex items-center transition-all">
                    <i class="fa fa-download mr-1"></i> 导出
                </button>
            </div>
            
            <!-- 加载动画 -->
            <div id="loader" class="hidden flex justify-center items-center py-10">
                <div class="loader w-10 h-10 border-4 border-gray-200 rounded-full"></div>
            </div>
            
            <!-- 结果列表 -->
            <div id="resultList" class="bg-white rounded-xl shadow-md overflow-hidden">
                <!-- 表头 -->
                <div class="grid grid-cols-12 bg-gray-50 text-sm font-medium text-light py-3 px-4 border-b">
                    <div class="col-span-3">Item #</div>
                    <div class="col-span-6">Item Description</div>
                    <div class="col-span-3 text-right">2026含税价格</div>
                </div>
                
                <!-- 结果内容 -->
                <div id="resultContent" class="max-h-[50vh] overflow-y-auto">
                    <!-- 无结果提示 -->
                    <div id="noResult" class="hidden py-10 text-center text-light">
                        <i class="fa fa-search-minus text-3xl mb-2"></i>
                        <p>未找到匹配的价格信息</p>
                    </div>
                    
                    <!-- 结果项将由JS动态填充 -->
                </div>
            </div>
        </section>
    </main>

        // 填充Market下拉菜单
        function populateMarketSelect() {
            const markets = priceData.markets;
            markets.forEach(market => {
                const option = document.createElement('option');
                option.value = market;
                option.textContent = market;
                marketSelect.appendChild(option);
            });
        }
        
        // 填充ProductLine下拉菜单
        function populateProductLineSelect(selectedMarket) {
            // 清空并禁用后续下拉菜单
            resetSelect(productLineSelect, '请选择产品线');
            resetSelect(modelSelect, '请先选择产品线', true);
            resetSelect(contractTypeSelect, '请先选择型号', true);
            searchBtn.disabled = true;
            
            if (!selectedMarket) {
                productLineSelect.disabled = true;
                return;
            }
            
            // 启用ProductLine选择
            productLineSelect.disabled = false;
            
            // 获取该Market对应的ProductLine
            const productLines = priceData.marketProductLines[selectedMarket];
            
            // 填充ProductLine
            productLines.forEach(pl => {
                const option = document.createElement('option');
                option.value = pl;
                option.textContent = pl;
                productLineSelect.appendChild(option);
            });
        }
        
        // 填充Model下拉菜单
        function populateModelSelect(selectedMarket, selectedProductLine) {
            // 清空并禁用后续下拉菜单
            resetSelect(modelSelect, '请选择型号');
            resetSelect(contractTypeSelect, '请先选择型号', true);
            searchBtn.disabled = true;
            
            if (!selectedMarket || !selectedProductLine) {
                modelSelect.disabled = true;
                return;
            }
            
            // 启用Model选择
            modelSelect.disabled = false;
            
            // 筛选该Market和ProductLine对应的Model
            const models = [...new Set(
                allRecords
                    .filter(record => record.Market === selectedMarket && record.ProductLine === selectedProductLine)
                    .map(record => record.Model)
                    .sort()
            )];
            
            // 填充Model
            models.forEach(model => {
                const option = document.createElement('option');
                option.value = model;
                option.textContent = model;
                modelSelect.appendChild(option);
            });
        }
        
        // 填充合约类型下拉菜单
        function populateContractTypeSelect(selectedMarket, selectedProductLine, selectedModel) {
            // 清空后续下拉菜单
            resetSelect(contractTypeSelect, '请选择合约类型');
            searchBtn.disabled = true;
            
            if (!selectedMarket || !selectedProductLine || !selectedModel) {
                contractTypeSelect.disabled = true;
                return;
            }
            
            // 启用合约类型选择
            contractTypeSelect.disabled = false;
            
            // 筛选对应的合约类型
            const contractTypes = [...new Set(
                allRecords
                    .filter(record => 
                        record.Market === selectedMarket && 
                        record.ProductLine === selectedProductLine && 
                        record.Model === selectedModel
                    )
                    .map(record => record.合约类型)
                    .sort()
            )];
            
            // 填充合约类型
            contractTypes.forEach(ct => {
                const option = document.createElement('option');
                option.value = ct;
                option.textContent = ct;
                contractTypeSelect.appendChild(option);
            });
            
            // 启用查询按钮
            searchBtn.disabled = false;
        }
        
        // 执行查询
        function executeSearch() {
            const selectedMarket = marketSelect.value;
            const selectedProductLine = productLineSelect.value;
            const selectedModel = modelSelect.value;
            const selectedContractType = contractTypeSelect.value;
            
            // 显示结果区域和加载动画
            resultSection.classList.remove('hidden');
            loader.classList.remove('hidden');
            resultContent.innerHTML = '';
            noResult.classList.add('hidden');
            
            // 模拟加载延迟，提升用户体验
            setTimeout(() => {
                try {
                    // 筛选符合条件的记录
                    const filteredRecords = allRecords.filter(record => 
                        record.Market === selectedMarket && 
                        record.ProductLine === selectedProductLine && 
                        record.Model === selectedModel && 
                        record.合约类型 === selectedContractType
                    );
                    
                    // 更新结果计数
                    resultCount.textContent = filteredRecords.length;
                    
                    // 隐藏加载动画
                    loader.classList.add('hidden');
                    
                    // 处理结果
                    if (filteredRecords.length === 0) {
                        // 无结果
                        noResult.classList.remove('hidden');
                    } else {
                        // 有结果，填充列表
                        filteredRecords.forEach(record => {
                            const resultItem = createResultItem(record);
                            resultContent.appendChild(resultItem);
                        });
                    }
                    
                } catch (error) {
                    console.error('查询错误:', error);
                    loader.classList.add('hidden');
                    noResult.classList.remove('hidden');
                    noResult.innerHTML = `
                        <i class="fa fa-exclamation-circle text-3xl mb-2 text-red-500"></i>
                        <p>查询过程中发生错误</p>
                    `;
                }
            }, 600);
        }
        
        // 创建结果项
        function createResultItem(record) {
            const item = document.createElement('div');
            item.className = 'grid grid-cols-12 py-3 px-4 border-b result-item';
            
            // 格式化价格（添加千位分隔符）
            const formattedPrice = record['2026 含税价格'].toString().replace(/\B(?=(\d{3})+(?!\d))/g, ",");
            
            item.innerHTML = `
                <div class="col-span-3 font-medium">${record.Item}</div>
                <div class="col-span-6 text-sm text-gray-600 line-clamp-2">${record['Item Description']}</div>
                <div class="col-span-3 text-right font-semibold text-primary">¥${formattedPrice}</div>
            `;
            
            return item;
        }
        
        // 重置下拉菜单
        function resetSelect(selectElement, defaultText, disable = false) {
            // 保存当前选中状态
            const wasDisabled = selectElement.disabled;
            
            // 清空选项
            selectElement.innerHTML = '';
            
            // 添加默认选项
            const defaultOption = document.createElement('option');
            defaultOption.value = '';
            defaultOption.textContent = defaultText;
            selectElement.appendChild(defaultOption);
            
            // 设置禁用状态
            if (disable) {
                selectElement.disabled = true;
            } else if (!wasDisabled) {
                selectElement.disabled = false;
            }
        }
        
        // 重置所有查询条件
        function resetAll() {
            // 重置所有下拉菜单
            marketSelect.selectedIndex = 0;
            productLineSelect.selectedIndex = 0;
            modelSelect.selectedIndex = 0;
            contractTypeSelect.selectedIndex = 0;
            
            // 禁用后续下拉菜单和查询按钮
            productLineSelect.disabled = true;
            modelSelect.disabled = true;
            contractTypeSelect.disabled = true;
            searchBtn.disabled = true;
            
            // 隐藏结果区域
            resultSection.classList.add('hidden');
        }
        
        // 导出查询结果
        function exportResults() {
            const selectedMarket = marketSelect.value;
            const selectedProductLine = productLineSelect.value;
            const selectedModel = modelSelect.value;
            const selectedContractType = contractTypeSelect.value;
            
            // 筛选结果
            const filteredRecords = allRecords.filter(record => 
                record.Market === selectedMarket && 
                record.ProductLine === selectedProductLine && 
                record.Model === selectedModel && 
                record.合约类型 === selectedContractType
            );
            
            if (filteredRecords.length === 0) {
                alert('没有可导出的结果');
                return;
            }
            
            // 准备CSV内容
            const headers = ['Item #', 'Item Description', '2026 含税价格', 'Market', 'ProductLine', 'Model', '合约类型'];
            let csvContent = headers.join(',') + '\n';
            
            filteredRecords.forEach(record => {
                const row = [
                    record.Item,
                    `"${record['Item Description'].replace(/"/g, '""')}"`, // 处理引号
                    record['2026 含税价格'],
                    `"${record.Market.replace(/"/g, '""')}"`,
                    `"${record.ProductLine.replace(/"/g, '""')}"`,
                    record.Model,
                    record.合约类型
                ].join(',');
                csvContent += row + '\n';
            });
            
            // 创建下载链接
            const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.setAttribute('href', url);
            
            // 设置文件名
            const fileName = `价格查询结果_${selectedMarket}_${selectedProductLine}_${selectedModel}_${selectedContractType}_${new Date().getTime()}.csv`;
            a.setAttribute('download', fileName);
            
            // 触发下载
            a.style.display = 'none';
            document.body.appendChild(a);
            a.click();
            
            // 清理
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }
        
        // 添加事件监听器
        function addEventListeners() {
            // Market选择变化
            marketSelect.addEventListener('change', () => {
                const selectedMarket = marketSelect.value;
                populateProductLineSelect(selectedMarket);
            });
            
            // ProductLine选择变化
            productLineSelect.addEventListener('change', () => {
                const selectedMarket = marketSelect.value;
                const selectedProductLine = productLineSelect.value;
                populateModelSelect(selectedMarket, selectedProductLine);
            });
            
            // Model选择变化
            modelSelect.addEventListener('change', () => {
                const selectedMarket = marketSelect.value;
                const selectedProductLine = productLineSelect.value;
                const selectedModel = modelSelect.value;
                populateContractTypeSelect(selectedMarket, selectedProductLine, selectedModel);
            });
            
            // 合约类型选择变化
            contractTypeSelect.addEventListener('change', () => {
                searchBtn.disabled = !contractTypeSelect.value;
            });
            
            // 查询按钮点击
            searchBtn.addEventListener('click', executeSearch);
            
            // 重置按钮点击
            resetBtn.addEventListener('click', resetAll);
            
            // 导出按钮点击
            exportBtn.addEventListener('click', exportResults);
            
            // 为下拉菜单添加触摸反馈
            const selects = document.querySelectorAll('select');
            selects.forEach(select => {
                select.addEventListener('touchstart', (e) => {
                    select.classList.add('bg-gray-50');
                });
                select.addEventListener('touchend', (e) => {
                    setTimeout(() => {
                        select.classList.remove('bg-gray-50');
                    }, 200);
                });
            });
        }
    </script>
</body>
</html>
